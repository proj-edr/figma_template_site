name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  visual-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: website

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: website/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Ensure baseline snapshots exist
        run: |
          mkdir -p tests/snapshots
          if [ -f ../Home_v1_desktop.png ] && [ ! -f tests/snapshots/Home-v1-desktop.png ]; then cp ../Home_v1_desktop.png tests/snapshots/Home-v1-desktop.png; fi
          if [ -f ../Home_v1_mobile.png ] && [ ! -f tests/snapshots/home-v1-mobile.png ]; then cp ../Home_v1_mobile.png tests/snapshots/home-v1-mobile.png; fi

      - name: Run visual tests
        run: npm run test:visual

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: website/playwright-report/
          if-no-files-found: ignore

      - name: Upload Playwright test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: website/test-results/
          if-no-files-found: ignore
